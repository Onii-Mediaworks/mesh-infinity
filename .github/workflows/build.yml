name: build

on:
  push:
    branches: ["**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Android ────────────────────────────────────────────────────────────────

  android:
    name: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - run: cargo install cargo-ndk

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Install Android CMake
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - run: make -j2 android-debug android-release CI_RUN_NUMBER=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-android
          path: build/output/android/**/*.apk

  # ── macOS ──────────────────────────────────────────────────────────────────

  macos:
    name: macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install rsync
        run: brew install rsync

      - run: make -j2 macos-debug macos-release CI_RUN_NUMBER=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos
          path: build/output/macos/**/*.dmg

  # ── iOS ────────────────────────────────────────────────────────────────────

  ios:
    name: ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install rsync
        run: brew install rsync

      - run: make -j2 ios-debug ios-release CI_RUN_NUMBER=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-ios
          path: build/output/ios/**/*.ipa

  # ── Linux ──────────────────────────────────────────────────────────────────

  linux:
    name: linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libblkid-dev liblzma-dev ninja-build \
            rpm ruby-dev rsync
          sudo gem install --no-document fpm
          curl -Lo /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - run: make -j2 linux-debug linux-release CI_RUN_NUMBER=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-linux
          path: build/output/linux/

  # ── Windows ────────────────────────────────────────────────────────────────

  windows:
    name: windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      # openssl-sys vendored build requires Strawberry Perl (pre-installed on
      # windows-latest). Git Bash's MSYS2 perl shadows Strawberry even with
      # GITHUB_PATH ordering. Remove it via PowerShell using its Windows path.
      - name: Remove MSYS2 perl (use Strawberry Perl for openssl-sys)
        shell: pwsh
        run: Remove-Item -Path "C:\Program Files\Git\usr\bin\perl.exe" -ErrorAction SilentlyContinue

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install rsync via MSYS2
        shell: pwsh
        run: |
          # Git for Windows does NOT ship rsync. Install from the MSYS2 toolchain
          # that is pre-installed on windows-latest at C:\msys64. This rsync
          # understands MSYS2 POSIX paths (/d/a/...) unlike cwRsync (choco).
          C:\msys64\usr\bin\pacman.exe -S --noconfirm rsync
          # Remove MSYS2 perl so it cannot shadow Strawberry Perl.
          # openssl-sys vendored build requires Strawberry Perl (Windows-native paths);
          # MSYS2 perl uses Cygwin paths and fails Configure with exit code 255.
          Remove-Item -Path "C:\msys64\usr\bin\perl.exe" -ErrorAction SilentlyContinue
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Windows packaging dependencies
        shell: pwsh
        run: |
          choco install 7zip --no-progress -y
          # Install NSIS via MSYS2 mingw64 so makensis lands in C:\msys64\mingw64\bin\
          # and is visible to the MSYS2 bash shell that runs make. Choco's NSIS installs
          # to "C:\Program Files (x86)\NSIS" which MSYS2 bash cannot resolve due to the
          # space in the path.
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-nsis
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - run: make -j2 windows-debug windows-release CI_RUN_NUMBER=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-windows
          path: build/output/windows/

  # ── Prerelease ─────────────────────────────────────────────────────────────
  # Every push to main creates a public release tagged v<version>-r<run_number>.
  # The release name is "V<version> - r<run_number>".
  # Body contains the triggering commit message plus a changelog since the
  # last version tag.

  prerelease:
    name: prerelease
    needs: [macos, ios, android, linux, windows]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.macos.result == 'success' ||
        needs.ios.result == 'success' ||
        needs.android.result == 'success' ||
        needs.linux.result == 'success' ||
        needs.windows.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect release metadata
        id: meta
        run: |
          VERSION=$(grep '^version:' frontend/pubspec.yaml \
            | sed 's/version:[[:space:]]*//' | cut -d+ -f1)

          COMMIT_MSG=$(git log -1 --pretty=format:"%B")

          # Changelog: all commits since the last vX.Y.Z tag (no -r suffix).
          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" \
              --pretty=format:"- %h %s" 2>/dev/null || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %h %s" | head -50)
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "commit_msg<<__DELIM__"
            echo "$COMMIT_MSG"
            echo "__DELIM__"
          } >> "$GITHUB_OUTPUT"
          {
            echo "changelog<<__DELIM__"
            echo "$CHANGELOG"
            echo "__DELIM__"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: mesh-infinity-*
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}-r${{ github.run_number }}
          name: "V${{ steps.meta.outputs.version }} - r${{ github.run_number }}"
          prerelease: true
          draft: false
          body: |
            ${{ steps.meta.outputs.commit_msg }}

            ---

            **Changes since last release:**
            ${{ steps.meta.outputs.changelog }}
          files: |
            dist/**/*.dmg
            dist/**/*.ipa
            dist/**/*.apk
            dist/**/*.AppImage
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.exe
            dist/**/*.zip

  # ── Full Release ───────────────────────────────────────────────────────────
  # Triggered by pushing a version tag (e.g. git tag v0.3.0 && git push --tags).
  # Creates a proper (non-prerelease) GitHub Release named "V<version>".
  # One release per version number; pushing the same tag again overwrites it.

  release:
    name: release
    needs: [macos, ios, android, linux, windows]
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref, '-r') &&
      (
        needs.macos.result == 'success' ||
        needs.ios.result == 'success' ||
        needs.android.result == 'success' ||
        needs.linux.result == 'success' ||
        needs.windows.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect release metadata
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Changelog: all commits since the previous vX.Y.Z tag.
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p' || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %h %s")
          else
            CHANGELOG=$(git log --pretty=format:"- %h %s" | head -50)
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "changelog<<__DELIM__"
            echo "$CHANGELOG"
            echo "__DELIM__"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: mesh-infinity-*
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: "V${{ steps.meta.outputs.version }}"
          prerelease: false
          body: |
            **Changelog:**
            ${{ steps.meta.outputs.changelog }}
          files: |
            dist/**/*.dmg
            dist/**/*.ipa
            dist/**/*.apk
            dist/**/*.AppImage
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.exe
            dist/**/*.zip
