name: build

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos:
    name: macos-${{ matrix.profile }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make macos-${{ matrix.profile }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos-${{ matrix.profile }}
          path: build/output/macos/${{ matrix.profile }}/meshinfinity-*-${{ matrix.profile }}.dmg
