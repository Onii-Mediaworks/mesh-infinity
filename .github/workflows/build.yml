name: build

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────

  build-linux:
    name: linux (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libx11-dev libxkbcommon-dev libxcursor-dev \
            libxrandr-dev libxi-dev libxinerama-dev \
            libxrender-dev libxfixes-dev libxext-dev \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make build-${{ matrix.profile }} OS=linux

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-linux-${{ matrix.profile }}
          path: build/output/*/linux/meshinfinity-*-${{ matrix.profile }}.tar.gz

  # ── Windows ────────────────────────────────────────────────────────────────

  build-windows:
    name: windows (${{ matrix.profile }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: build windows (${{ matrix.profile }})
        run: make build-${{ matrix.profile }} OS=windows
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-windows-${{ matrix.profile }}
          path: build/output/*/windows/meshinfinity-*-${{ matrix.profile }}/

  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos:
    name: macos (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make build-${{ matrix.profile }} OS=macos UNSIGNED=1

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos-${{ matrix.profile }}
          path: build/output/*/macos/meshinfinity-*-${{ matrix.profile }}.app

  # ── iOS ────────────────────────────────────────────────────────────────────

  build-ios:
    name: ios (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make build-${{ matrix.profile }} OS=ios UNSIGNED=1

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-ios-${{ matrix.profile }}
          path: build/output/*/ios/meshinfinity-*-${{ matrix.profile }}.ipa

  # ── Android ────────────────────────────────────────────────────────────────

  build-android:
    name: android (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked

      - run: make build-${{ matrix.profile }} OS=android

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-android-${{ matrix.profile }}
          path: build/output/*/android/meshinfinity-*-${{ matrix.profile }}.apk
