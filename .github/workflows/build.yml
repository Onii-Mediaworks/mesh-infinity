name: build

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos:
    name: macos-${{ matrix.profile }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make macos-${{ matrix.profile }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos-${{ matrix.profile }}
          path: build/output/macos/${{ matrix.profile }}/*.dmg

  # ── Android ────────────────────────────────────────────────────────────────

  build-android:
    name: android-${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - run: cargo install cargo-ndk

      - run: make android-${{ matrix.profile }}

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-android-${{ matrix.profile }}
          path: build/output/android/${{ matrix.profile }}/*.apk

  # ── Prerelease ─────────────────────────────────────────────────────────────

  release:
    name: prerelease
    needs: [build-macos, build-android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mesh-infinity-*
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          prerelease: true
          files: |
            dist/*.dmg
            dist/*.apk
