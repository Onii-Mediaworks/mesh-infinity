name: build

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────

  build-linux:
    name: linux (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libx11-dev libxkbcommon-dev libxcursor-dev \
            libxrandr-dev libxi-dev libxinerama-dev \
            libxrender-dev libxfixes-dev libxext-dev \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            rpm libfuse2

      - name: install fpm
        run: sudo gem install --no-document fpm

      - name: install appimagetool
        run: |
          sudo wget -qO /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make build-${{ matrix.profile }} OS=linux

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-linux-${{ matrix.profile }}
          path: |
            build/output/*/linux/meshinfinity-*-${{ matrix.profile }}.tar.gz
            build/output/*/linux/meshinfinity-*-${{ matrix.profile }}.deb
            build/output/*/linux/meshinfinity-*-${{ matrix.profile }}.rpm
            build/output/*/linux/meshinfinity-*-${{ matrix.profile }}.AppImage

  # ── Windows ────────────────────────────────────────────────────────────────

  build-windows:
    name: windows (${{ matrix.profile }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: install NSIS
        run: choco install nsis -y

      - name: build windows (${{ matrix.profile }})
        run: make build-${{ matrix.profile }} OS=windows SHELL=bash
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-windows-${{ matrix.profile }}
          path: build/output/*/windows/meshinfinity-*-${{ matrix.profile }}.exe

  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos:
    name: macos (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make build-${{ matrix.profile }} OS=macos UNSIGNED=1

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos-${{ matrix.profile }}
          path: build/output/*/macos/meshinfinity-*-${{ matrix.profile }}.dmg

  # ── iOS ────────────────────────────────────────────────────────────────────

  build-ios:
    name: ios (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: make build-${{ matrix.profile }} OS=ios UNSIGNED=1

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-ios-${{ matrix.profile }}
          path: build/output/*/ios/meshinfinity-*-${{ matrix.profile }}.ipa

  # ── Android ────────────────────────────────────────────────────────────────

  build-android:
    name: android (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: cache cargo-ndk
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-linux-${{ runner.arch }}-v3

      - name: install cargo-ndk
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk --locked

      - run: make build-${{ matrix.profile }} OS=android

      - uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-android-${{ matrix.profile }}
          path: build/output/*/android/meshinfinity-*-${{ matrix.profile }}.apk

  # ── Publish prerelease ──────────────────────────────────────────────────────

  publish:
    name: publish prerelease
    needs: [build-linux, build-windows, build-macos, build-ios, build-android]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: compute release tag
        id: tag
        run: |
          tag="dev-${GITHUB_REF_NAME//\//-}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: publish prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          mapfile -t files < <(find dist -type f | sort)
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --title "Pre-release: ${{ github.ref_name }}" \
            --notes "Automated build from commit \`${{ github.sha }}\`" \
            "${files[@]}"
