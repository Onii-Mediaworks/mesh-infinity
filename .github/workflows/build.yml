name: mesh-infinity build

on:
  push:
    branches: ["**"]
  pull_request:

env:
  build_type_debug: "true"
  build_type_release: "false"
  build_os_windows: "true"
  build_os_linux: "true"
  build_os_macos: "true"
  build_os_android: "false"
  build_os_ios: "false"

jobs:
  build-flags:
    name: mesh-infinity build flags
    runs-on: ubuntu-latest
    outputs:
      build_type_debug: ${{ steps.flags.outputs.build_type_debug }}
      build_type_release: ${{ steps.flags.outputs.build_type_release }}
      build_os_windows: ${{ steps.flags.outputs.build_os_windows }}
      build_os_linux: ${{ steps.flags.outputs.build_os_linux }}
      build_os_macos: ${{ steps.flags.outputs.build_os_macos }}
      build_os_android: ${{ steps.flags.outputs.build_os_android }}
      build_os_ios: ${{ steps.flags.outputs.build_os_ios }}
    steps:
      - name: set flags
        id: flags
        run: |
          echo "build_type_debug=${{ env.build_type_debug }}" >> $GITHUB_OUTPUT
          echo "build_type_release=${{ env.build_type_release }}" >> $GITHUB_OUTPUT
          echo "build_os_windows=${{ env.build_os_windows }}" >> $GITHUB_OUTPUT
          echo "build_os_linux=${{ env.build_os_linux }}" >> $GITHUB_OUTPUT
          echo "build_os_macos=${{ env.build_os_macos }}" >> $GITHUB_OUTPUT
          echo "build_os_android=${{ env.build_os_android }}" >> $GITHUB_OUTPUT
          echo "build_os_ios=${{ env.build_os_ios }}" >> $GITHUB_OUTPUT

  app-windows-debug:
    name: mesh-infinity windows debug
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_debug == 'true' && needs.build-flags.outputs.build_os_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (debug)
        run: cargo build -p mesh-infinity
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: build flutter bundle (debug)
        run: flutter build windows --debug
        working-directory: frontend

      - name: stage backend for flutter
        shell: pwsh
        run: |
          Copy-Item "${{ runner.temp }}\netinfinity-cargo\debug\mesh_infinity.dll" frontend\build\windows\x64\runner\Debug\mesh_infinity.dll

      - name: upload app bundle (windows, debug)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-windows-debug
          path: frontend/build/windows/x64/runner/Debug

  app-linux-debug:
    name: mesh-infinity linux debug
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_debug == 'true' && needs.build-flags.outputs.build_os_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxrender-dev \
            libxfixes-dev \
            libxext-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: enable linux desktop
        run: flutter config --enable-linux-desktop

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (debug)
        run: cargo build -p mesh-infinity
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: build flutter bundle (debug)
        run: flutter build linux --debug
        working-directory: frontend

      - name: stage backend for flutter
        run: |
          cp "${{ runner.temp }}/netinfinity-cargo/debug/libmesh_infinity.so" \
            frontend/build/linux/x64/debug/bundle/libmesh_infinity.so

      - name: upload app bundle (linux, debug)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-linux-debug
          path: frontend/build/linux/x64/debug/bundle

  app-macos-debug:
    name: mesh-infinity macos debug
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_debug == 'true' && needs.build-flags.outputs.build_os_macos == 'true' }}
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: enable macos desktop
        run: flutter config --enable-macos-desktop

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (debug)
        run: cargo build -p mesh-infinity
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: build flutter bundle (debug)
        run: flutter build macos --debug
        working-directory: frontend

      - name: stage backend for flutter
        run: |
          cp "${{ runner.temp }}/netinfinity-cargo/debug/libmesh_infinity.dylib" \
            frontend/build/macos/Build/Products/Debug/mesh_infinity_frontend.app/Contents/MacOS/libmesh_infinity.dylib

      - name: upload app bundle (macos, debug)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos-debug
          path: frontend/build/macos/Build/Products/Debug/mesh_infinity_frontend.app

  app-windows-release:
    name: mesh-infinity windows release
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_release == 'true' && needs.build-flags.outputs.build_os_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (release)
        run: cargo build --release -p mesh-infinity
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: build flutter bundle (release)
        run: flutter build windows --release
        working-directory: frontend

      - name: stage backend for flutter
        shell: pwsh
        run: |
          Copy-Item "${{ runner.temp }}\netinfinity-cargo\release\mesh_infinity.dll" frontend\build\windows\x64\runner\Release\mesh_infinity.dll

      - name: upload app bundle (windows, release)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-windows-release
          path: frontend/build/windows/x64/runner/Release

  app-linux-release:
    name: mesh-infinity linux release
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_release == 'true' && needs.build-flags.outputs.build_os_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxrender-dev \
            libxfixes-dev \
            libxext-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: enable linux desktop
        run: flutter config --enable-linux-desktop

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (release)
        run: cargo build --release -p mesh-infinity
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: build flutter bundle (release)
        run: flutter build linux --release
        working-directory: frontend

      - name: stage backend for flutter
        run: |
          cp "${{ runner.temp }}/netinfinity-cargo/release/libmesh_infinity.so" \
            frontend/build/linux/x64/release/bundle/libmesh_infinity.so

      - name: upload app bundle (linux, release)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-linux-release
          path: frontend/build/linux/x64/release/bundle

  app-macos-release:
    name: mesh-infinity macos release
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_release == 'true' && needs.build-flags.outputs.build_os_macos == 'true' }}
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: enable macos desktop
        run: flutter config --enable-macos-desktop

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (release)
        run: cargo build --release -p mesh-infinity
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: build flutter bundle (release)
        run: flutter build macos --release
        working-directory: frontend

      - name: stage backend for flutter
        run: |
          cp "${{ runner.temp }}/netinfinity-cargo/release/libmesh_infinity.dylib" \
            frontend/build/macos/Build/Products/Release/mesh_infinity_frontend.app/Contents/MacOS/libmesh_infinity.dylib

      - name: upload app bundle (macos, release)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-macos-release
          path: frontend/build/macos/Build/Products/Release/mesh_infinity_frontend.app

  android-debug:
    name: mesh-infinity android debug
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_debug == 'true' && needs.build-flags.outputs.build_os_android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (debug)
        run: |
          cargo install cargo-ndk --locked
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86_64 \
            -o frontend/android/app/src/main/jniLibs build -p mesh-infinity

      - name: build android app (debug)
        run: flutter build apk --debug
        working-directory: frontend

      - name: upload android apk (debug)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-android-debug
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk

  android-release:
    name: mesh-infinity android release
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_release == 'true' && needs.build-flags.outputs.build_os_android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (release)
        run: |
          cargo install cargo-ndk --locked
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86_64 \
            -o frontend/android/app/src/main/jniLibs build -p mesh-infinity --release

      - name: build android app (release)
        run: flutter build apk --release
        working-directory: frontend

      - name: upload android apk (release)
        uses: actions/upload-artifact@v4
        with:
          name: mesh-infinity-android-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  ios-debug:
    name: mesh-infinity ios debug
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_debug == 'true' && needs.build-flags.outputs.build_os_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (debug)
        run: |
          cargo build -p mesh-infinity --target aarch64-apple-ios
          cargo build -p mesh-infinity --target x86_64-apple-ios

      - name: build ios app (debug)
        run: flutter build ios --debug --no-codesign
        working-directory: frontend

  ios-release:
    name: mesh-infinity ios release
    needs: build-flags
    if: ${{ needs.build-flags.outputs.build_type_release == 'true' && needs.build-flags.outputs.build_os_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build backend (release)
        run: |
          cargo build -p mesh-infinity --target aarch64-apple-ios --release
          cargo build -p mesh-infinity --target x86_64-apple-ios --release

      - name: build ios app (release)
        run: flutter build ios --release --no-codesign
        working-directory: frontend
