name: net-infinity build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  slint-app:
    name: net-infinity(${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxrender-dev \
            libxfixes-dev \
            libxext-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: build app
        run: cargo build --release -p net-infinity-ui
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/netinfinity-cargo

      - name: upload app binary (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: net-infinity-${{ matrix.os }}
          path: ${{ runner.temp }}/netinfinity-cargo/release/net-infinity-ui

      - name: upload app binary (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: net-infinity-${{ matrix.os }}
          path: ${{ runner.temp }}/netinfinity-cargo/release/net-infinity-ui.exe

  android:
    name: net-infinity (android)
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: build android shell
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.7
          build-root-directory: android
          arguments: assembleDebug

  ios:
    name: net-infinity (ios)
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build ios shell
        run: |
          xcodebuild \
            -project NetInfinity.xcodeproj \
            -scheme NetInfinity-iOS \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build
