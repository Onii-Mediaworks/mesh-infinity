[package]
name = "net-infinity"
version = "0.1.0"
edition = "2021"

[lib]
name = "net_infinity"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
# Core networking
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
tracing = "0.1"
anyhow = "1.0"
thiserror = "1.0"
config = "0.13"

# Cryptography
ring = "0.16"
x25519-dalek = "1.1"
ed25519-dalek = "1.0"
chacha20poly1305 = "0.9"
argon2 = "0.5"
bip39 = "2.0"
hkdf = "0.12"
sha2 = "0.10"
rand_core = "0.5"
zeroize = "1.3"
base64 = "0.22"

# Network utilities
socket2 = "0.5"

# Virtual network interface
pnet = "0.28"
tun-tap = "0.1"

# WireGuard
boringtun = "0.3"

# Tor integration
arti-client = "0.1"
tor-rtcompat = "0.1"

# File transfer
tokio-stream = "0.1"
bytes = "1.0"
crc32fast = "1.3"

# DNS
trust-dns-resolver = "0.22"
trust-dns-server = "0.22"

# NAT traversal
stun = "0.1"
turn = "0.1"

# Performance
flate2 = "1.0"
lru = "0.12"

# Backend services
getrandom = "0.2"
time = { version = "0.3", features = ["formatting"] }
crossbeam-channel = "0.5"

# FFI
flutter_rust_bridge = "1.80.0"
libc = "0.2"
